name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Run tests
        run: npm test

  notchmeter:
    name: NotchMeter verification
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show Swift version
        run: swift --version

      - name: Verify NotchMeter
        run: npm run notch:verify

  wear:
    name: Wear OS debug build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wear

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --stacktrace
